# /etc/nginx/sites-available/geocrop
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/geocrop /etc/nginx/sites-enabled/

# Adaptive API rate limiting — 30 requests/sec per client IP, 10 MB zone
limit_req_zone $binary_remote_addr zone=geocrop_api:10m rate=30r/s;

upstream django_backend {
    server 127.0.0.1:8000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS (Let's Encrypt via certbot) ────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header Referrer-Policy           strict-origin-when-cross-origin;

    # ── Upload size (no limit — MBTiles files can be arbitrarily large) ────
    client_max_body_size 0;
    client_body_timeout  600s;

    # ── API → Django/Gunicorn ───────────────────────────────────────────────
    location /api/ {
        limit_req zone=geocrop_api burst=50 nodelay;
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Django Admin ────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://django_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django static files ─────────────────────────────────────────────────
    location /static/ {
        alias /var/www/geocrop/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Media files (field photos etc.) ────────────────────────────────────
    # Note: MBTiles are served via Django API (auth-protected), not directly
    location /media/ {
        alias /var/www/geocrop/backend/media/;
        # Deny direct access to MBTiles — must go through API
        location /media/mbtiles/ {
            deny all;
            return 403;
        }
        expires 7d;
    }

    # ── APK / IPA downloads — never cache ──────────────────────────────────
    location ~* \.(apk|ipa)$ {
        root /var/www/geocrop/frontend/dist;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # ── Download & login pages — always fresh ───────────────────────────────
    location ~* ^/(download|signin)(/.*)?$ {
        root /var/www/geocrop/frontend/dist;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
        try_files $uri $uri/index.html =404;
    }

    # ── Frontend (static HTML/JS/CSS) ───────────────────────────────────────
    location / {
        root  /var/www/geocrop/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;   # SPA fallback
        expires 1h;
    }

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
