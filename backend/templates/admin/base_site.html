{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | ZINGSA Admin{% endblock %}

{% block extrahead %}
{{ block.super }}
<link rel="icon" type="image/png" href="{% static 'logo/zingsa_logo.png' %}">
<style>
  #site-name a {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  #site-name img {
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    padding: 2px;
  }
</style>
{% endblock %}

{% block branding %}
<div id="site-name">
  <a href="{% url 'admin:index' %}">
    <img src="{% static 'logo/zingsa_logo.png' %}" alt="ZINGSA" height="38">
    <span>ZINGSA Geo-Crop Collector Portal Management</span>
  </a>
</div>
{% endblock %}
